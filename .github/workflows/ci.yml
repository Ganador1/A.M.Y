name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - public-release-hardening
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff check (non-blocking)
        run: ruff check . --output-format=github --exit-zero

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal runtime + test deps
        run: |
          python -m pip install --upgrade pip
          # CI-only minimal subset: heavy ML libs (torch/jax/chromadb) are NOT
          # required by the hermetic test set. We install only what the fast
          # tests actually load — adding sympy/scipy/numpy/networkx because
          # core.atlas_real_tools exercises them on every run.
          python -m pip install \
            "pytest>=8.0" \
            "pytest-asyncio>=0.23" \
            "pytest-timeout>=2.3" \
            "pyyaml>=6.0" \
            "rich>=13.0" \
            "python-dotenv>=1.0.0" \
            "structlog>=24.1.0" \
            "numpy>=1.26" \
            "scipy>=1.12" \
            "sympy>=1.12" \
            "networkx>=3.2" \
            "httpx>=0.27"

      - name: Show environment
        run: |
          python --version
          python -c "import pytest, yaml, rich, structlog, numpy, scipy, sympy, networkx, httpx; print('deps ok')"

      - name: Run hermetic test suite
        # CI has no Atlas venv (atlas/.venv_new), so tests that spawn the Atlas
        # worker cannot run here — `-m "not atlas"` deselects them. The hermetic
        # tests inside these files (stub-based guardrail/misuse checks, etc.)
        # still run. The non-atlas part of the suite is also covered by the
        # broader marker query in the next step.
        run: |
          python -m pytest \
            tests/test_public_release_hygiene.py \
            tests/test_science_gates.py \
            tests/test_scientific_hardening.py \
            tests/test_atlas_real_tools.py \
            tests/test_atlas_no_mocks.py \
            tests/test_atlas_tools_end_to_end.py \
            tests/test_literature_search.py \
            tests/test_core.py \
            tests/test_security_guardrails.py \
            tests/test_atlas_misuse_guard.py \
            tests/test_reproducibility.py \
            tests/test_sandbox_isolation.py \
            tests/test_honesty_fixes.py \
            tests/test_ranking_and_goal.py \
            tests/test_atlas_bridge_robustness.py \
            tests/test_robustness_fixes.py \
            tests/test_integrity_and_bounds.py \
            tests/test_episodic_persistence.py \
            tests/test_semantic_persistence.py \
            tests/test_consolidation_wired.py \
            tests/test_web_sensor_async.py \
            tests/test_rapid_round_fixes.py \
            tests/test_embedding_recall.py \
            tests/test_metrics.py \
            tests/test_cli_config.py \
            -m "not atlas" \
            -q --tb=short -p no:cacheprovider

      - name: Verify every Atlas tool computes (no mocks, deterministic)
        run: python scripts/diagnostics/verify_atlas_tools.py

  hygiene:
    name: Public release hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install minimal deps
        run: python -m pip install --upgrade pip pytest "pytest-timeout>=2.3"

      - name: Run public release hygiene tests
        run: python -m pytest tests/test_public_release_hygiene.py -q

      - name: Verify secret hygiene
        run: python scripts/diagnostics/verify_secret_hygiene.py --strict

  build-check:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distribution artifacts
        run: python -m build --sdist --wheel --outdir dist/

      - name: List artifacts
        run: ls -lah dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amy-dist-${{ github.sha }}
          path: dist/*
          retention-days: 7
          if-no-files-found: error
