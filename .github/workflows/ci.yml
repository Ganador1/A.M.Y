name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - public-release-hardening
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff check (non-blocking)
        run: ruff check . --output-format=github --exit-zero

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal runtime + test deps
        run: |
          python -m pip install --upgrade pip
          # CI-only minimal subset: heavy ML libs (torch/jax/chromadb) are NOT
          # required by the hermetic test set. We install only what the fast
          # tests actually load.
          python -m pip install \
            "pytest>=8.0" \
            "pytest-asyncio>=0.23" \
            "pyyaml>=6.0" \
            "rich>=13.0" \
            "python-dotenv>=1.0.0" \
            "structlog>=24.1.0"

      - name: Show environment
        run: |
          python --version
          python -c "import pytest, yaml, rich, structlog; print('deps ok')"

      - name: Run hermetic test suite
        run: |
          python -m pytest \
            tests/test_public_release_hygiene.py \
            tests/test_science_gates.py \
            tests/test_scientific_hardening.py \
            -q --tb=short

  hygiene:
    name: Public release hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install minimal deps
        run: python -m pip install --upgrade pip pytest

      - name: Run public release hygiene tests
        run: python -m pytest tests/test_public_release_hygiene.py -q

      - name: Verify secret hygiene
        run: python scripts/diagnostics/verify_secret_hygiene.py --strict

  build-check:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distribution artifacts
        run: python -m build --sdist --wheel --outdir dist/

      - name: List artifacts
        run: ls -lah dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amy-dist-${{ github.sha }}
          path: dist/*
          retention-days: 7
          if-no-files-found: error
