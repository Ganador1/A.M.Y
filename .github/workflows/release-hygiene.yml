name: Release hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest

      - name: Run public release hygiene tests
        run: python -m pytest tests/test_public_release_hygiene.py -q

      - name: Verify secret hygiene
        run: python scripts/diagnostics/verify_secret_hygiene.py --strict
