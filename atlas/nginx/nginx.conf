# AXIOM META 4 - NGINX Configuration
# =================================
# Load balancer y proxy reverso para Phase 4

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Upstream servers (para load balancing)
    upstream axiom_api {
        least_conn;
        server axiom-api:8000 max_fails=3 fail_timeout=30s;
        # Para múltiples instancias:
        # server axiom-api-1:8000 max_fails=3 fail_timeout=30s;
        # server axiom-api-2:8000 max_fails=3 fail_timeout=30s;
        # server axiom-api-3:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # SSL Configuration (deshabilitado por defecto)
    # ssl_certificate /etc/nginx/ssl/axiom.crt;
    # ssl_certificate_key /etc/nginx/ssl/axiom.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

    server {
        listen 80;
        server_name localhost;

        # Redirect HTTP to HTTPS (opcional)
        # return 301 https://$server_name$request_uri;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # API endpoints con rate limiting
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://axiom_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Health check endpoint (sin rate limiting)
        location /health {
            proxy_pass http://axiom_api/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # Static files
        location /static/ {
            proxy_pass http://axiom_api/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Documentation
        location /docs {
            proxy_pass http://axiom_api/docs;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://axiom_api/redoc;
            proxy_set_header Host $host;
        }

        # OpenAPI schema
        location /openapi.json {
            proxy_pass http://axiom_api/openapi.json;
            proxy_set_header Host $host;
            expires 1d;
            add_header Cache-Control "public";
        }

        # Default location
        location / {
            proxy_pass http://axiom_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # HTTPS Server (deshabilitado por defecto)
    # server {
    #     listen 443 ssl http2;
    #     server_name localhost;
    #
    #     ssl_certificate /etc/nginx/ssl/axiom.crt;
    #     ssl_certificate_key /etc/nginx/ssl/axiom.key;
    #
    #     # Copiar configuración del servidor HTTP aquí
    # }
}
