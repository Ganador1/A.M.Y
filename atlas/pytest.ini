[pytest]
asyncio_mode = auto
# Keep output concise by default; individual runs can override
addopts = -q --import-mode=importlib

# Reduce noisy deprecation warnings during collection/run
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestDeprecationWarning
    # ignore::pydantic.warnings.PydanticDeprecatedSince20  # Commented: Pydantic v2 doesn't emit these warnings
