apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "[axiom-]YYYY.MM.DD"
    isDefault: false
    editable: true
    jsonData:
      timeField: "@timestamp"
      esVersion: 80
      logMessageField: "message"
      logLevelField: "level"
      maxConcurrentShardRequests: 5
