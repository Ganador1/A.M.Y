# AXIOM META 4 - Logstash Configuration
# ====================================
# Procesamiento de logs para ELK stack

input {
  # Recibir logs de la aplicación AXIOM
  tcp {
    port => 5000
    codec => json_lines
    type => "axiom-api"
  }

  # Recibir logs de NGINX
  file {
    path => "/var/log/nginx/access.log"
    start_position => "beginning"
    type => "nginx-access"
  }

  file {
    path => "/var/log/nginx/error.log"
    start_position => "beginning"
    type => "nginx-error"
  }

  # Recibir logs de PostgreSQL (si está configurado)
  # file {
  #   path => "/var/log/postgresql/postgresql-*.log"
  #   start_position => "beginning"
  #   type => "postgresql"
  # }
}

filter {
  # Procesar logs de AXIOM API
  if [type] == "axiom-api" {
    json {
      source => "message"
    }

    # Extraer campos comunes
    if [level] {
      mutate {
        lowercase => ["level"]
      }
    }

    # Parsear timestamp si existe
    if [timestamp] {
      date {
        match => ["timestamp", "ISO8601"]
        target => "@timestamp"
      }
    }

    # Añadir campos adicionales
    mutate {
      add_field => {
        "service" => "axiom-api"
        "environment" => "production"
      }
    }
  }

  # Procesar logs de NGINX Access
  if [type] == "nginx-access" {
    grok {
      match => {
        "message" => '%{IPORHOST:clientip} - %{DATA:ident} \[%{HTTPDATE:timestamp}\] "%{WORD:verb} %{DATA:request} HTTP/%{NUMBER:httpversion}" %{NUMBER:response} %{NUMBER:bytes} "%{DATA:referrer}" "%{DATA:agent}" %{DATA:rt} %{DATA:uct} %{DATA:uht} %{DATA:urt}'
      }
    }

    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }

    mutate {
      add_field => {
        "service" => "nginx"
        "log_type" => "access"
      }
      convert => {
        "response" => "integer"
        "bytes" => "integer"
      }
    }

    # Filtrar requests exitosos
    if [response] >= 200 and [response] < 400 {
      mutate {
        add_tag => ["success"]
      }
    }

    # Filtrar errores del cliente
    if [response] >= 400 and [response] < 500 {
      mutate {
        add_tag => ["client_error"]
      }
    }

    # Filtrar errores del servidor
    if [response] >= 500 {
      mutate {
        add_tag => ["server_error"]
      }
    }
  }

  # Procesar logs de NGINX Error
  if [type] == "nginx-error" {
    grok {
      match => {
        "message" => '%{SYSLOGTIMESTAMP:timestamp} \[%{LOGLEVEL:severity}\] %{POSINT:pid}#%{POSINT:tid}: \*%{POSINT:connection} %{DATA:message}'
      }
    }

    mutate {
      add_field => {
        "service" => "nginx"
        "log_type" => "error"
      }
    }
  }

  # Añadir geoip information si está disponible
  if [clientip] {
    geoip {
      source => "clientip"
      target => "geoip"
    }
  }

  # Añadir información del host
  mutate {
    add_field => {
      "host" => "%{[@metadata][hostname]}"
      "processed_at" => "%{[@timestamp]}"
    }
  }
}

output {
  # Enviar a Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "axiom-%{+YYYY.MM.dd}"

    # Configuración de mapeo
    template_name => "axiom"
    template => "/etc/logstash/templates/axiom.json"
    template_overwrite => true
  }

  # Debug output (deshabilitar en producción)
  # stdout {
  #   codec => rubydebug
  # }
}
