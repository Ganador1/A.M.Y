# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
# see https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file for a short guide on the ini file


# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# format using "red" for the colorization used in the output.
#color_mode = red

# the output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
qualname =
handlers = console
channel =

[logger_sqlalchemy]
level = WARN
qualname = sqlalchemy.engine
handlers =
channel =

[logger_alembic]
level = INFO
qualname = alembic
handlers =
channel =

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are called
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" for the code formatting used in the output.
# code_formatters = black

# Format using `ruff format` for the code formatting used in the output.
# code_formatters = ruff_format

# Format using "red" for the colorization used in the output.
# color_mode = red

# Configuration for the database connection
[database_url]
# This should match your actual database URL
# For PostgreSQL: postgresql://user:password@localhost/axiom_meta4
# For SQLite (development): sqlite:///migrations.db
url = sqlite:///migrations.db
