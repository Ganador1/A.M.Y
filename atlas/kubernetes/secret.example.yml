apiVersion: v1
kind: Secret
metadata:
  name: axiom-secrets
  namespace: axiom-system
  labels:
    app: axiom
type: Opaque
stringData:
  DATABASE_PASSWORD: "replace-with-generated-database-password"
  REDIS_PASSWORD: ""
  JWT_SECRET_KEY: "replace-with-generated-jwt-secret"
  ADMIN_PASSWORD: "replace-with-generated-admin-password"
