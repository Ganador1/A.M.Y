apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiom-api
  namespace: axiom-system
  labels:
    app: axiom
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: axiom
      component: api
  template:
    metadata:
      labels:
        app: axiom
        component: api
    spec:
      containers:
      - name: axiom-api
        image: axiom-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: axiom-config
              key: ENVIRONMENT
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: axiom-secrets
              key: JWT_SECRET_KEY
        - name: DATABASE_URL
          value: "postgresql://axiom_user:$(DATABASE_PASSWORD)@axiom-postgres:5432/axiom_db"
        - name: REDIS_URL
          value: "redis://axiom-redis:6379/0"
        - name: ALLOWED_HOSTS
          valueFrom:
            configMapKeyRef:
              name: axiom-config
              key: ALLOWED_HOSTS
        envFrom:
        - configMapRef:
            name: axiom-config
        - secretRef:
            name: axiom-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: axiom-api
  namespace: axiom-system
  labels:
    app: axiom
    component: api
spec:
  selector:
    app: axiom
    component: api
  ports:
  - port: 80
    targetPort: 8000
    name: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: axiom-api-hpa
  namespace: axiom-system
  labels:
    app: axiom
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: axiom-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
