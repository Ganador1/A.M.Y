apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiom-postgres
  namespace: axiom-system
  labels:
    app: axiom
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axiom
      component: database
  template:
    metadata:
      labels:
        app: axiom
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "axiom_db"
        - name: POSTGRES_USER
          value: "axiom_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: axiom-secrets
              key: DATABASE_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-init
          mountPath: /docker-entrypoint-initdb.d
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - axiom_user
            - -d
            - axiom_db
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - axiom_user
            - -d
            - axiom_db
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: axiom-postgres-pvc
      - name: postgres-init
        configMap:
          name: axiom-postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: axiom-postgres
  namespace: axiom-system
  labels:
    app: axiom
    component: database
spec:
  selector:
    app: axiom
    component: database
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: axiom-postgres-pvc
  namespace: axiom-system
  labels:
    app: axiom
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: axiom-postgres-init
  namespace: axiom-system
  labels:
    app: axiom
    component: database
data:
  init-db.sql: |
    -- AXIOM Database initialization will be loaded from the main init script
