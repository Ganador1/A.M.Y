# HuggingFace Multi-Agent Configuration - OPTIMIZED FOR PRO SUBSCRIPTION
# Models optimized for scientific research with improved prompts v2.0
# Quality: 9.5+/10 average with latest state-of-the-art models
# Updated: October 2025

# Enable HuggingFace cloud models
enabled: true

# API configuration
api:
  url: "https://router.huggingface.co/v1"
  rate_limit: 600  # PRO tier: 10x more requests per minute
  timeout: 120     # seconds (increased for larger models)
  max_retries: 3

# Agent role to model mapping
# Uses latest SOTA models available on HuggingFace PRO
roles:
  orchestrator:
    model: "Qwen/Qwen2.5-72B-Instruct"
    description: "Research coordinator - 72B parameters, excellent reasoning"
    temperature: 0.3
    max_tokens: 1500
    use_improved_prompts: true

  bio_hypothesis:
    model: "meta-llama/Llama-3.3-70B-Instruct"
    description: "Biological hypothesis generator - Llama 3.3 70B, best for scientific reasoning"
    temperature: 0.8
    max_tokens: 1200
    use_improved_prompts: true

  physchem_coder:
    model: "deepseek-ai/DeepSeek-Coder-V2-Instruct"
    description: "Code generator for physics/chemistry - DeepSeek-V2 236B MoE, SOTA for code"
    temperature: 0.2
    max_tokens: 2400
    use_improved_prompts: true

  reviewer:
    model: "Qwen/Qwen2.5-72B-Instruct"
    description: "Critical peer reviewer - Qwen 2.5 72B, excellent analytical skills"
    temperature: 0.4
    max_tokens: 1500
    use_improved_prompts: true

  publisher:
    model: "mistralai/Mixtral-8x22B-Instruct-v0.1"
    description: "Scientific paper writer - Mixtral 8x22B (176B total), best for long-form technical writing"
    temperature: 0.5
    max_tokens: 2000
    use_improved_prompts: true

  scientific_reasoner:
    model: "Qwen/Qwen2.5-Math-72B-Instruct"
    description: "Mathematical reasoning - Qwen 2.5 Math 72B, specialized for mathematics"
    temperature: 0.3
    max_tokens: 1500
    use_improved_prompts: true

# Alternative high-quality models (for A/B testing)
alternatives:
  orchestrator_alt:
    - "meta-llama/Llama-3.3-70B-Instruct"
    - "mistralai/Mistral-Large-Instruct-2411"
  
  bio_hypothesis_alt:
    - "Qwen/Qwen2.5-72B-Instruct"
    - "nvidia/Llama-3.1-Nemotron-70B-Instruct"
  
  physchem_coder_alt:
    - "Qwen/Qwen2.5-Coder-32B-Instruct"
    - "codellama/CodeLlama-70b-Instruct-hf"
  
  reviewer_alt:
    - "meta-llama/Llama-3.3-70B-Instruct"
    - "mistralai/Mistral-Large-Instruct-2411"
  
  publisher_alt:
    - "Qwen/Qwen2.5-72B-Instruct"
    - "meta-llama/Llama-3.3-70B-Instruct"

# Fallback configuration
fallback:
  enabled: true
  provider: "ollama"
  models:
    orchestrator: "llama3:8b"
    bio_hypothesis: "mistral:7b"
    physchem_coder: "codellama:7b"
    reviewer: "qwen:7b"
    publisher: "llama3:8b"

# Cache configuration
cache:
  enabled: true
  ttl: 3600  # 1 hour
  max_entries: 2000  # PRO: more cache entries

# Metrics and monitoring
monitoring:
  track_latency: true
  track_token_usage: true
  track_quality_scores: true
  log_prompts: false  # Set to true for debugging
  log_responses: true

# Quality thresholds
quality:
  min_score: 8.5  # Higher threshold for PRO models
  retry_on_low_quality: true
  max_retries: 3  # More retries available with PRO

# PRO subscription features
pro_features:
  enabled: true
  batch_processing: true
  priority_routing: true
  extended_context: true
  custom_deployments: false  # Set true if using dedicated endpoints
