[pytest]
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# A hanging test should fail loudly, not block the whole run. Most of the
# slow tests are network/Atlas-bound; 120s is generous for a single test.
# Override per-test with @pytest.mark.timeout(N), or globally with
# `--timeout=N`. The `thread` method works with asyncio tests.
timeout = 120
timeout_method = thread

# Test taxonomy. Select the fast unit set with:
#   pytest -m "not (slow or network or atlas)"
markers =
    slow: takes more than a few seconds (LLM/network/heavy compute)
    network: hits the network (literature search, Ollama Cloud, arXiv/PubMed)
    atlas: requires the Atlas worker / atlas venv (fastapi, scientific libs)
    integration: exercises multiple subsystems end-to-end
    unit: fast, hermetic, no network or Atlas worker

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
